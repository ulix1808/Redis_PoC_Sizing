version: '3.8'

# Docker Compose para PoC de Redis
# Ver MANUAL-REDIS-POC.md para documentación completa

services:
  redis-poc:
    image: redis:latest
    container_name: redis-poc
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --maxmemory 3gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-stack-poc:
    image: redis/redis-stack:latest
    container_name: redis-stack-poc
    ports:
      - "6380:6379"
      - "8001:8001"
    volumes:
      - redis-stack-data:/data
    environment:
      - REDIS_ARGS=--save 60 1000 --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped
    profiles:
      - stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  redis-stack-data:
